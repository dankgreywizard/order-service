services:
  postgres:
    image: postgres:18-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: ${DB_NAME:-orderdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-artemis:2.39.0
    container_name: order-activemq
    ports:
      - "61616:61616"  # JMS Broker
      - "8161:8161"    # Web Console
    environment:
      - ARTEMIS_USER=${JMS_USER:-admin}
      - ARTEMIS_PASSWORD=${JMS_PASSWORD:-admin}
    healthcheck:
      test: ["CMD-SHELL", "/opt/activemq-artemis/bin/artemis check queue --name DLQ --user ${JMS_USER:-admin} --password ${JMS_PASSWORD:-admin} || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: .
    container_name: order-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-orderdb}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - JMS_BROKER_URL=${JMS_BROKER_URL:-tcp://activemq:61616}
      - JMS_USER=${JMS_USER:-admin}
      - JMS_PASSWORD=${JMS_PASSWORD:-admin}
      - SPRING_SECURITY_USER_NAME=${SPRING_SECURITY_USER_NAME:-user}
      - SPRING_SECURITY_USER_PASSWORD=${SPRING_SECURITY_USER_PASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
